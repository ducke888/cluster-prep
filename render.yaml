# Render.com deploy config. Single web service that serves the whole static
# site (app.html at root, app.js, styles.css, data/, the *-guides.js files,
# privacy.html, terms.html, favicon.svg) over HTTP via unified-serve.js.
#
# unified-serve.js uses only Node built-ins (http/fs/path) — no dependencies,
# so there is no build step. The legacy /api server was retired (the client is
# Firestore-only now).
#
# Deploy: push to GitHub → render.com → New → Web Service → connect repo → Apply.
# Custom domain clusterprep.site is configured in the Render dashboard.

services:
  - type: web
    name: deca-marketing
    runtime: node
    plan: free
    buildCommand: "true"
    startCommand: node unified-serve.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: "3001"
